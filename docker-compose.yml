version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: datafrontier_db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: ecommercedb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.1'
          memory: 256M

  # pgadmin:
  #   image: dpage/pgadmin4
  #   container_name: datafrontier_pgadmin
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@datafrontier.com.br
  #     PGADMIN_DEFAULT_PASSWORD: admin
  #   ports:
  #     - "5050:80"
  #   depends_on:
  #     - postgres
  #   restart: unless-stopped
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: '0.5'
  #         memory: 512M

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: datafrontier_backend
    environment:
      - DATABASE_URL=postgresql://root:rootpassword@postgres:5432/ecommercedb?schema=public
      - JWT_SECRET=${JWT_SECRET:-S3cr3t#DataFronti3r}
      - PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
        reservations:
          cpus: '0.2'
          memory: 256M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: datafrontier_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

volumes:
  postgres_data:
