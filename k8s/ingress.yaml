apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: datafrontier-ingress
  annotations:
    # Usa o NGINX Ingress Controller (compatível com cert-manager)
    kubernetes.io/ingress.class: "nginx"

    # ─── Cert-Manager: emissão automática de certificado Let's Encrypt ───
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # ─── Redirecionamento forçado para HTTPS ───
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # ─── Timeout e proxy para o backend NestJS ───
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"

spec:
  # ─── Regras de roteamento por host ───────────────
  rules:
  # Loja (Frontend React)
  - host: datafrontier.com.br
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80

  # API (Backend NestJS)
  - host: api.datafrontier.com.br
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 3000

  # ─── TLS: Let's Encrypt emite e renova os certificados automaticamente ─
  tls:
  - hosts:
    - datafrontier.com.br
    secretName: tls-datafrontier-frontend   # Cert-Manager cria este Secret
  - hosts:
    - api.datafrontier.com.br
    secretName: tls-datafrontier-backend    # Cert-Manager cria este Secret
