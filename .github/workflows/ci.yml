name: 🔍 CI — Integração Contínua

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────
  #  JOB 1: Frontend (React + Vite)
  # ─────────────────────────────────────────────────
  frontend-ci:
    name: 🖥️ Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🏗️ Build de produção (Vite)
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3000/api

  # ─────────────────────────────────────────────────
  #  JOB 2: Backend (NestJS + Prisma)
  # ─────────────────────────────────────────────────
  backend-ci:
    name: ⚙️ Backend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🗄️ Gerar Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci_user:ci_pass@localhost:5432/ci_db

      - name: 🏗️ Build de produção (NestJS)
        run: npm run build
